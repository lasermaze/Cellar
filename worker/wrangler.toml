name = "cellar-memory-proxy"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# Required secrets (set via: wrangler secret put <NAME>):
#   GITHUB_APP_PEM           — GitHub App RSA private key (PEM format)
#   GITHUB_APP_ID            — GitHub App numeric ID
#   GITHUB_INSTALLATION_ID   — GitHub App installation ID for the memory repo

[vars]
CELLAR_MEMORY_REPO = "lasermaze/cellar-memory"
