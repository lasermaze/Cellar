name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16.2 (Swift 6.1)
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Build universal binary
        run: |
          # Build each arch separately to avoid xcodebuild _RopeModule bug
          swift build -c release --arch arm64
          swift build -c release --arch x86_64
          # Merge into universal binary with lipo
          mkdir -p .build/universal
          lipo -create \
            .build/arm64-apple-macosx/release/cellar \
            .build/x86_64-apple-macosx/release/cellar \
            -output .build/universal/cellar
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE="cellar-${VERSION}-macos.tar.gz"
          tar -czf "$ARCHIVE" -C .build/universal cellar
          echo "ARCHIVE=$ARCHIVE" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Smoke test
        run: |
          # ArgumentParser exits non-zero for --help; just verify the binary runs and prints usage
          .build/universal/cellar --help 2>&1 | head -5 || true
          # Verify it's actually a universal binary
          file .build/universal/cellar | grep -q "universal"

      - name: Generate checksum
        run: shasum -a 256 "$ARCHIVE" > "${ARCHIVE}.sha256"

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ARCHIVE }}
            ${{ env.ARCHIVE }}.sha256
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}
